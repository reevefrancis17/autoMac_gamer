[env]
rom_path = "/Users/reevefrancis/repos/dmgtris/bin/PandorasBlocks.gbc"
action_repeat = 1
frame_skip = 1
max_episode_steps = 2000
headless_speed = 0
watch_speed = 1
reset_seed_modulo = 256

[reward]
survival_reward = 0.01
line_clear_reward = 5.0
score_delta_scale = 0.01
game_over_penalty = -5.0

[model]
hidden_dim = 256
learning_rate = 0.0007
gamma = 0.99
batch_size = 128
replay_capacity = 120000
learning_starts = 3000
train_frequency = 2
target_update_interval = 2000
epsilon_start = 1.0
epsilon_end = 0.03
epsilon_decay_steps = 120000

[device]
preference = "mps"

[run]
seed = 7
total_steps = 30000
log_interval = 500
checkpoint_interval = 5000
run_dir = "runs/tetris_baseline/main"
resume_from = ""

[watch]
checkpoint_poll_seconds = 5.0
refresh_between_episodes = true
watch_episodes = 0
